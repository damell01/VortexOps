upstream frappe_backend  { server backend:8000; }
upstream frappe_socketio { server websocket:9000; }

server {
    listen 80;
    server_name _;
    client_max_body_size 50m;

    # Static assets served directly from the sites volume
    location /assets {
        alias /home/frappe/frappe-bench/sites/assets;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /files {
        alias /home/frappe/frappe-bench/sites;
        try_files /$host/$uri @backend;
    }

    # WebSocket
    location /socket.io {
        proxy_pass         http://frappe_socketio;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Everything else → gunicorn
    location / {
        proxy_pass         http://frappe_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }
}

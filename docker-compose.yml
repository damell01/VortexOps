services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: vortexops:local
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-vortexops}
      DB_USERNAME: ${DB_USERNAME:-vortexops}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
      FILESYSTEM_DISK: public
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      WAIT_FOR_DB: "true"
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - app-storage:/var/www/html/storage

  worker:
    image: vortexops:local
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-vortexops}
      DB_USERNAME: ${DB_USERNAME:-vortexops}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
      FILESYSTEM_DISK: public
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      RUN_MIGRATIONS: "false"
      WAIT_FOR_DB: "true"
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=120"]
    volumes:
      - app-storage:/var/www/html/storage

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-vortexops}
      MYSQL_USER: ${DB_USERNAME:-vortexops}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - mysql-data:/var/lib/mysql

  ollama:
    image: ollama/ollama:latest
    profiles: ["ai"]
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama

volumes:
  app-storage:
  mysql-data:
  ollama-data:
